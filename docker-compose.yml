services:
  db:
    image: postgres:15-alpine
    container_name: foodorder-postgres
    environment:
      POSTGRES_DB: foodorder
      POSTGRES_USER: foodorder
      POSTGRES_PASSWORD: foodorder
    ports:
      - "5432:5432"
    volumes:
      - foodorder-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodorder -d foodorder"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: foodorder-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/foodorder
      SPRING_DATASOURCE_USERNAME: foodorder
      SPRING_DATASOURCE_PASSWORD: foodorder
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

volumes:
  foodorder-postgres-data:
